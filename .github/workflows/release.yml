name: Release with Velopack

on:
  push:
    tags:
      # does not trigger on prerelease tags like 0.30.0-beta1
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    runs-on: windows-latest # will run commands on powershell, windows is needed so that ATS signtool.exe works inside --azureTrustedSignFile
    permissions: write-all # or Workflow permissions https://github.com/goswinr/Fesh/settings/actions  ??
    steps:

    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Push tag with -net48 suffix
      uses: richardsimko/update-tag@v1
      with:
        tag_name: "${{ github.ref_name }}-net48"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'

    - name: Run dotnet publish net48
      run: | #shell
        dotnet publish FeshStandalone.fsproj `
          --configuration Release `
          --runtime win-x64 `
          --output bin/publish/net48 `
          --framework net48 `
          --no-self-contained

    - name: Run dotnet publish net10.0
      run: | #shell
        dotnet publish FeshStandalone.fsproj `
          --configuration Release `
          --runtime win-x64 `
          --output bin/publish/net10.0 `
          --framework net10.0-windows `
          --no-self-contained

    - name: Check version consistency of git tag and CHANGELOG.md
      # needs in fsproj:
      # <Target Name="WriteChangelogVersion" AfterTargets="AfterBuild"><!-- for version checks in github tag based builds -->
      #   <WriteLinesToFile File="./bin/ChangelogVersion.txt" Lines="@(CurrentReleaseChangelog)" Overwrite="true" ContinueOnError="false" />
      # </Target>
      id: check_version
      shell: bash
      run: | #shell
        CHANGELOG_VERSION=$(cat ./bin/ChangelogVersion.txt | tr -d '[:space:]')
        if [ "${{ github.ref_name }}" != "$CHANGELOG_VERSION" ]; then
          echo "Version mismatch: git tag (${{ github.ref_name }}) and version in CHANGELOG.md ($CHANGELOG_VERSION) are not the same."
          exit 1
        fi
        echo "CHANGELOG_VERSION=$CHANGELOG_VERSION"
        echo "github.ref_name=${{ github.ref_name }}"
        echo "Version check of git tag and CHANGELOG.md passed successfully."

    - name: Azure login
      uses: azure/login@v3
      with:
        # get creds via Azure CLI:
        # az ad sp create-for-rbac --name "cli-Service-Principal5" --role "Trusted Signing Certificate Profile Signer" --scopes /subscriptions/4138e73f-????-????-????-44540281d64e --sdk-auth
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        enable-AzPSSession: true

    - name: Pack, Sign and Release with Velopack .NET Framework 4.8
      # https://docs.velopack.io/reference/cli/content/vpk-windows
      # If you are publishing your application with --no-self-contained,
      # then you should provide the --framework argument. https://docs.velopack.io/packaging/bootstrapping
      run: |
        dotnet tool install vpk  --global       
        
        vpk download github `
          --repoUrl https://github.com/goswinr/Fesh `
          --token ${{secrets.GITHUB_TOKEN}} `
          --outputDir bin/installer/net48 `
          --channel framework

        vpk pack `
          --packId Fesh.net48 `
          --packVersion "${{github.ref_name}}"  `
          --packDir bin/publish/net48 `
          --mainExe Fesh.exe `
          --framework net48 `
          --icon Media/logoInstaller.ico  `
          --packAuthors "Goswin R" `
          --releaseNotes .github/InstallNotes-net48.md `
          --azureTrustedSignFile .github/signing-metadata.json `
          --splashImage Media/logo128.png `
          --outputDir bin/installer/net48 `
          --channel framework

        vpk upload github `
          --publish `
          --repoUrl https://github.com/goswinr/Fesh `
          --releaseName "Fesh ${{github.ref_name}} net4.8" `
          --tag "${{github.ref_name}}-net48" `
          --token ${{secrets.GITHUB_TOKEN}} `
          --outputDir bin/installer/net48 `
          --channel framework
          
    - name: Pack, Sign and Release with Velopack .NET 10.0
      # https://docs.velopack.io/reference/cli/content/vpk-windows
      # If you are publishing your application with --no-self-contained, then you should provide the --framework argument. https://docs.velopack.io/packaging/bootstrapping
      # The channel name is just an identifier; it is not shown in the app.
      # See also checkForNewVelopackRelease(config:Config, fesh:Fesh) in Initialize.fs
      # and https://docs.velopack.io/integrating/switching-channels for channels.
      #
      # Channel rename (e.g. net10 -> net11 in the future):
      # Per https://docs.velopack.io/packaging/channels#renaming-a-channel a channel cannot be
      # renamed directly. To migrate users, pack/upload the next release on the new channel
      # (e.g. --channel net11) and then upload a copy of releases.net11.json as releases.net10.json
      # to the same GitHub release. Existing net10 clients will fetch releases.net10.json, update
      # to that build, and from then on poll releases.net11.json (because the package itself is
      # stamped with --channel net11). Keep the redirect step on every release so latecomers
      # always get pulled forward to the latest build on the new channel.
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      run: |
        dotnet tool install vpk  --global

        vpk download github `
          --repoUrl https://github.com/goswinr/Fesh `
          --token ${{secrets.GITHUB_TOKEN}} `
          --outputDir bin/installer/net10.0 `
          --channel net10

        vpk pack `
          --packId Fesh `
          --packVersion ${{github.ref_name}} `
          --packDir bin/publish/net10.0 `
          --mainExe Fesh.exe `
          --framework net10.0-x64-desktop `
          --icon Media/logoInstaller.ico  `
          --packAuthors "Goswin R" `
          --releaseNotes .github/InstallNotes-net10.md `
          --azureTrustedSignFile .github/signing-metadata.json `
          --splashImage Media/logo128.png `
          --outputDir bin/installer/net10.0 `
          --channel net10

        # Redirect file for the previous channel name (net9 -> net10 migration).
        # Existing net9 clients fetch releases.net9.json, see this newer build, and update.
        # Once updated they poll releases.net10.json from then on. Safe to remove this line
        # after enough time has passed that no net9 clients remain in the wild.
        Copy-Item bin/installer/net10.0/releases.net10.json bin/installer/net10.0/releases.net9.json

        vpk upload github `
          --publish `
          --repoUrl https://github.com/goswinr/Fesh `
          --releaseName "Fesh ${{github.ref_name}} net10" `
          --tag ${{github.ref_name}} `
          --token ${{secrets.GITHUB_TOKEN}} `
          --outputDir bin/installer/net10.0 `
          --channel net10

        # Attach the net9 redirect manifest to the same GitHub release so old clients can find it.
        gh release upload "${{github.ref_name}}" bin/installer/net10.0/releases.net9.json --clobber
          

