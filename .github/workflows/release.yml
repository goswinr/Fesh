name: Release with Velopack

on:
  push:
    tags:
      # does not trigger on prerelease tags like 0.30.0-beta1
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    runs-on: windows-latest # will run commands on powershell, windows is needed so that ATS signtool.exe works inside --azureTrustedSignFile
    # Run in a GitHub Environment so the OIDC token's `sub` claim is the environment form
    # (repo:goswinr/Fesh:environment:releaseStandalone) instead of the branch/tag ref. This
    # decouples Azure federated login from the tag trigger: the same subject is presented on
    # every release regardless of which tag was pushed. Add required reviewers / branch limits
    # to this environment in repo Settings to gate who can release.
    environment:
      name: releaseStandalone
    # Least privilege: this workflow only pushes the -net48 tag and creates the GitHub Release,
    # both of which need just `contents: write`. Avoid `write-all`, which also grants packages,
    # deployments, actions, security-events, etc. that this job never uses.
    permissions:
      contents: write
      # Required for OIDC: lets the runner request a short-lived federated token from GitHub's
      # OIDC provider, which azure/login exchanges for an Azure access token. No client secret
      # is stored in GitHub. Azure trusts the token only if its `sub` claim matches the
      # federated credential configured on the app registration:
      #   repo:goswinr/Fesh:environment:releaseStandalone
      id-token: write
    steps:

    - name: Checkout repository
      # Pinned to a full commit SHA (a tag is mutable and can be repointed). Dependabot's
      # github-actions updater bumps both the SHA and the trailing version comment.
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        # Don't leave GITHUB_TOKEN in .git/config, where the vpk / dotnet tooling run later
        # could read it. This job authenticates each tool explicitly, so persistence isn't needed.
        persist-credentials: false

    - name: Push tag with -net48 suffix
      # Third-party action MUST be SHA-pinned: its v1 tag is mutable, and this step runs with
      # GITHUB_TOKEN, so a moved tag could exfiltrate the token or tamper with the release.
      uses: richardsimko/update-tag@d43d3236a342abd387f0ba5d6a7bc93b77e0e718 # v2.0.0
      with:
        tag_name: "${{ github.ref_name }}-net48"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
      with:
        dotnet-version: '10.x'

    - name: Run dotnet publish net48
      run: | #shell
        dotnet publish FeshStandalone.fsproj `
          --configuration Release `
          --runtime win-x64 `
          --output bin/publish/net48 `
          --framework net48 `
          --no-self-contained

    - name: Run dotnet publish net10.0
      run: | #shell
        dotnet publish FeshStandalone.fsproj `
          --configuration Release `
          --runtime win-x64 `
          --output bin/publish/net10.0 `
          --framework net10.0-windows `
          --no-self-contained

    - name: Check version consistency of git tag and CHANGELOG.md
      # needs in fsproj:
      # <Target Name="WriteChangelogVersion" AfterTargets="AfterBuild"><!-- for version checks in github tag based builds -->
      #   <WriteLinesToFile File="./bin/ChangelogVersion.txt" Lines="@(CurrentReleaseChangelog)" Overwrite="true" ContinueOnError="false" />
      # </Target>
      id: check_version
      shell: bash
      run: | #shell
        CHANGELOG_VERSION=$(cat ./bin/ChangelogVersion.txt | tr -d '[:space:]')
        if [ "${{ github.ref_name }}" != "$CHANGELOG_VERSION" ]; then
          echo "Version mismatch: git tag (${{ github.ref_name }}) and version in CHANGELOG.md ($CHANGELOG_VERSION) are not the same."
          exit 1
        fi
        echo "CHANGELOG_VERSION=$CHANGELOG_VERSION"
        echo "github.ref_name=${{ github.ref_name }}"
        echo "Version check of git tag and CHANGELOG.md passed successfully."

    - name: Azure login
      # SHA-pinned (mutable tag). This step opens a session that can sign with the org's
      # Trusted Signing certificate, so an upstream tag move here is especially high-impact.
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
      with:
        # OIDC (federated) login — no long-lived client secret in GitHub. Configure a
        # federated credential on the Azure app registration with:
        #   Issuer:  https://token.actions.githubusercontent.com
        #   Subject: repo:goswinr/Fesh:environment:releaseStandalone
        #   Audience: api://AzureADTokenExchange
        # and grant that app the "Trusted Signing Certificate Profile Signer" role.
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        # No enable-AzPSSession: vpk's Azure Trusted Signing authenticates via the Azure CLI
        # credential (the `az login` session this step always creates), not the Az PowerShell
        # module. Enabling the PS session only adds an unused login whose post-job teardown
        # (Clear-AzContext) emits the noisy "Az version is out of date" warnings.

    - name: Pack, Sign and Release with Velopack .NET Framework 4.8
      # https://docs.velopack.io/reference/cli/content/vpk-windows
      # If you are publishing your application with --no-self-contained,
      # then you should provide the --framework argument. https://docs.velopack.io/packaging/bootstrapping
      env:
        # vpk reads the token from VPK_TOKEN, so it is never placed on the command line / process
        # table. Actions already masks GITHUB_TOKEN in logs; this also covers the arg-exposure path.
        VPK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Pin the vpk version (supply-chain): an unpinned `tool install` pulls whatever is latest at
        # build time and runs it against the active signing session. Bump this manually when updating.
        dotnet tool install vpk --global --version 0.0.1298

        vpk download github `
          --repoUrl https://github.com/goswinr/Fesh `
          --outputDir bin/installer/net48 `
          --channel framework

        vpk pack `
          --packId Fesh.net48 `
          --packVersion "${{github.ref_name}}"  `
          --packDir bin/publish/net48 `
          --mainExe Fesh.exe `
          --framework net48 `
          --icon Media/logoInstaller.ico  `
          --packAuthors "Goswin R" `
          --releaseNotes .github/InstallNotes-net48.md `
          --azureTrustedSignFile .github/signing-metadata.json `
          --splashImage Media/logo128.png `
          --outputDir bin/installer/net48 `
          --channel framework

        vpk upload github `
          --publish `
          --repoUrl https://github.com/goswinr/Fesh `
          --releaseName "Fesh ${{github.ref_name}} net4.8" `
          --tag "${{github.ref_name}}-net48" `
          --outputDir bin/installer/net48 `
          --channel framework
          
    - name: Pack, Sign and Release with Velopack .NET 10.0
      # https://docs.velopack.io/reference/cli/content/vpk-windows
      # If you are publishing your application with --no-self-contained, then you should provide the --framework argument. https://docs.velopack.io/packaging/bootstrapping
      # The channel name is just an identifier; it is not shown in the app.
      # See also checkForNewVelopackRelease(config:Config, fesh:Fesh) in Initialize.fs
      # and https://docs.velopack.io/integrating/switching-channels for channels.
      #
      # Channel rename (e.g. net10 -> net11 in the future):
      # Per https://docs.velopack.io/packaging/channels#renaming-a-channel a channel cannot be
      # renamed directly. To migrate users, pack/upload the next release on the new channel
      # (e.g. --channel net11) and then upload a copy of releases.net11.json as releases.net10.json
      # to the same GitHub release. Existing net10 clients will fetch releases.net10.json, update
      # to that build, and from then on poll releases.net11.json (because the package itself is
      # stamped with --channel net11). Keep the redirect step on every release so latecomers
      # always get pulled forward to the latest build on the new channel.
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}   # used by `gh release upload` below
        VPK_TOKEN: ${{secrets.GITHUB_TOKEN}}  # used by vpk instead of --token on the command line
      run: |
        # Pinned vpk version (supply-chain) — keep in sync with the net48 step. Bump manually.
        dotnet tool install vpk --global --version 0.0.1298

        vpk download github `
          --repoUrl https://github.com/goswinr/Fesh `
          --outputDir bin/installer/net10.0 `
          --channel net10

        vpk pack `
          --packId Fesh `
          --packVersion ${{github.ref_name}} `
          --packDir bin/publish/net10.0 `
          --mainExe Fesh.exe `
          --framework net10.0-x64-desktop `
          --icon Media/logoInstaller.ico  `
          --packAuthors "Goswin R" `
          --releaseNotes .github/InstallNotes-net10.md `
          --azureTrustedSignFile .github/signing-metadata.json `
          --splashImage Media/logo128.png `
          --outputDir bin/installer/net10.0 `
          --channel net10

        # Redirect file for the previous channel name (net9 -> net10 migration).
        # Existing net9 clients fetch releases.net9.json, see this newer build, and update.
        # Once updated they poll releases.net10.json from then on. Safe to remove this line
        # after enough time has passed that no net9 clients remain in the wild.
        Copy-Item bin/installer/net10.0/releases.net10.json bin/installer/net10.0/releases.net9.json

        vpk upload github `
          --publish `
          --repoUrl https://github.com/goswinr/Fesh `
          --releaseName "Fesh ${{github.ref_name}} net10" `
          --tag ${{github.ref_name}} `
          --outputDir bin/installer/net10.0 `
          --channel net10

        # Attach the net9 redirect manifest to the same GitHub release so old clients can find it.
        gh release upload "${{github.ref_name}}" bin/installer/net10.0/releases.net9.json --clobber
          

